version: '3.8'

services:
  # CRM应用服务
  crm-app:
    build: .
    container_name: educonnect-crm
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///instance/edu_crm.db
    volumes:
      # 持久化数据库文件
      - crm_data:/app/instance
      # 持久化日志文件
      - crm_logs:/app/logs
    networks:
      - crm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx反向代理（可选，用于生产环境）
  nginx:
    image: nginx:alpine
    container_name: educonnect-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL证书目录（如果需要HTTPS）
    depends_on:
      - crm-app
    networks:
      - crm-network

  # 数据库备份服务（可选）
  db-backup:
    image: alpine:latest
    container_name: educonnect-backup
    restart: unless-stopped
    volumes:
      - crm_data:/data:ro
      - ./backups:/backups
    command: >
      sh -c "
        while true; do
          echo 'Creating database backup...'
          cp /data/edu_crm.db /backups/edu_crm_backup_$$(date +%Y%m%d_%H%M%S).db
          # 保留最近7天的备份
          find /backups -name 'edu_crm_backup_*.db' -mtime +7 -delete
          echo 'Backup completed. Next backup in 24 hours.'
          sleep 86400
        done
      "
    networks:
      - crm-network

# 数据卷
volumes:
  crm_data:
    driver: local
  crm_logs:
    driver: local

# 网络
networks:
  crm-network:
    driver: bridge
