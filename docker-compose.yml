version: '3.8'

services:
  # CRM应用服务 - 生产环境
  crm-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: false
    container_name: crm-production
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///instance/edu_crm.db
      - SECRET_KEY=${SECRET_KEY:-crm-production-secret-default}
    volumes:
      # 使用项目中的数据库文件
      - ./instance:/app/instance
      # 持久化日志文件
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - crm-network

  # 数据库管理工具（可选）
  adminer:
    image: adminer:latest
    container_name: crm-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=sqlite
      - ADMINER_DESIGN=pepa-linha
    volumes:
      - ./instance:/var/www/html/data:ro
    depends_on:
      - crm-app
    networks:
      - crm-network
    profiles:
      - tools  # 使用 docker-compose --profile tools up 启动

  # Nginx反向代理（可选，用于HTTPS和负载均衡）
  nginx:
    image: nginx:alpine
    container_name: crm-nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "8443:80"  # HTTP备用端口
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - crm-app
    networks:
      - crm-network
    profiles:
      - nginx  # 使用 docker-compose --profile nginx up 启动

networks:
  crm-network:
    driver: bridge
    name: crm-network

# 数据卷（如果需要命名卷而不是绑定挂载）
volumes:
  crm-data:
    driver: local
    name: crm-data
  crm-logs:
    driver: local
    name: crm-logs
