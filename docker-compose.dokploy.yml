version: '3.8'

services:
  # CRM应用服务 - Dokploy优化版
  crm-app:
    build:
      context: .
      dockerfile: Dockerfile.dokploy
    container_name: educonnect-crm
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///instance/edu_crm.db
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-this}
    volumes:
      # 持久化数据库文件
      - crm_data:/app/instance
      # 持久化日志文件
      - crm_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# 数据卷
volumes:
  crm_data:
    driver: local
  crm_logs:
    driver: local
