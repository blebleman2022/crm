version: '3.8'

services:
  # CRM应用服务 - 本地测试版
  crm-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-local-test
    restart: unless-stopped
    ports:
      - "8080:80"  # 使用8080端口避免冲突
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///instance/edu_crm.db
      - SECRET_KEY=test-secret-key-local
    volumes:
      # 持久化数据库文件到本地测试目录
      - ./test-data/instance:/app/instance
      # 持久化日志文件到本地测试目录
      - ./test-data/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 数据库查看器（可选）- 用于查看SQLite数据库
  adminer:
    image: adminer:latest
    container_name: crm-db-viewer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=sqlite
    volumes:
      - ./test-data/instance:/var/www/html/data
    depends_on:
      - crm-test
    profiles:
      - tools  # 使用profile，默认不启动

# 本地测试不需要持久化卷，直接使用bind mount
