server {
    listen 80;
    server_name sxylab.com www.sxylab.com;

    # 访问日志和错误日志
    access_log /var/log/nginx/sxylab_access.log;
    error_log /var/log/nginx/sxylab_error.log;

    # 客户端上传文件大小限制（根据需要调整）
    client_max_body_size 10M;

    # 静态文件目录（CSS、JS、图片等）
    location /static/ {
        alias /root/crm/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 上传文件目录（课程记录、获奖证书等）
    location /static/uploads/ {
        alias /root/crm/static/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 反向代理到Flask应用（Gunicorn）
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 可选：重定向www到非www（或反之）
    # 如果你想让 www.sxylab.com 重定向到 sxylab.com，取消下面的注释
    # if ($host = www.sxylab.com) {
    #     return 301 http://sxylab.com$request_uri;
    # }
}

